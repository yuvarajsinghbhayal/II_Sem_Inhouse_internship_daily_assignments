<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>

    <form>
        <input type="text" id="number1" placeholder="Enter First Number">
        <input type="text" id="number2" placeholder="Enter Second Number">

        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        <button type="button" onclick="performArithmeticOperations()">
            Perform Arithmetic Operation
        </button>

        <h3 id="result"></h3>
    </form>

    <script>
        function performArithmeticOperations() {

            const number1 = parseFloat(document.getElementById("number1").value);
            const number2 = parseFloat(document.getElementById("number2").value);
            const operator = document.getElementById("operator").value;

            let result;

            
            if (isNaN(number1) || isNaN(number2)) {
                document.getElementById("result").innerHTML =
                    "Please enter valid numbers.";
                return;
            }

            switch (operator) {
                case "+":
                    result = number1 + number2;
                    break;

                case "-":
                    result = number1 - number2;
                    break;

                case "*":
                    result = number1 * number2;
                    break;

                case "/":
                    if (number2 === 0) {
                        result = "Cannot divide by zero";
                    } else {
                        result = number1 / number2;
                    }
                    break;

                default:
                    result = "Invalid Operator";
            }

            document.getElementById("result").innerHTML =
                "Result = " + result;
        }
    </script>

</body>
</html>
