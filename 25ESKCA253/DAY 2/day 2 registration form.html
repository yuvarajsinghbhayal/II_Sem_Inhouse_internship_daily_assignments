<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Form</title>
</head>

<link rel="stylesheet" href="style.css">

<body>
    <div id="admission-form">
        <h1>Registration form</h1>
<h2>Details</h2>
<form>
    
    <label for="Name" >Name</label><br>
    <input type="text" id="Name" name="Name" placeholder="Enter your name"><br>

    <label for="age">age</label><br>
    <input type="number" id="age" name="age" placeholder="Enter your age"><br>

    <label for="Email">Email</label><br>
    <input type="Email" id="Email" name="Email" placeholder="Enter your email"><br>

    <label for="Branch">Branch</label><br>
    <input type="Branch" id="Branch" name="Branch" placeholder="Enter your branch"><br>

    <label for="10 passing year">10th passing year</label><br>
    <input type="number" id="10 passing year" name="10 passing year" placeholder="Enter 10th passing year"><br>

    <label for="12 passing year">12th passing year</label><br>
    <input type="number" id="12 passing year" name="12 passing year" placeholder="Enter 12th passing year"><br>
   
    <label for="upload marksheet" >Upload Marksheet</label><br>
    <input type="file" id="file" name="file"><br>
     <button type="submit">Submit</button>


</form>
</div>
</body>
    

</html>
