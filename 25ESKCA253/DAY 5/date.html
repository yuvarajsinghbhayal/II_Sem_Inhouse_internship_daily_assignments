<!DOCTYPE html>
<html>
<head>
    <title>Show Date</title>
</head>
<body>
<h1>Today date</h1>
    <button onclick="showDate()">Click Here</button>

    <p id="date"></p>

    <script>
        function showDate() {
            document.getElementById("date").innerHTML = new Date();
        }
    </script>

</body>
</html>
